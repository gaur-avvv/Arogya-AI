name: Project Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
jobs:
  backend-test:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verify Model Presence
        run: |
          test -f random_forest_model.pkl || echo "Warning: Model file missing"
          
      - name: Test Python Execution
        run: |
          # Basic syntax check for Python files
          python -m py_compile arogya_predict.py
          python -m py_compile disease_prediction_system.py
          python -m py_compile api/index.py
          
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install frontend dependencies
        run: npm install
        
      - name: Build frontend
        run: npm run build
